# Nginx Proxy Configuration para SB100 (Porta 5173 Única)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream combined_backend {
    server backend-node:5173;
}

server {
    # O container ouve na 443, que o Docker mapeia para 5173 no Host
    listen 443 ssl http2;
    server_name sb100cientometria.optin.com.br;

    # Certificados SSL
    ssl_certificate /etc/letsencrypt/live/sb100cientometria.optin.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sb100cientometria.optin.com.br/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    client_max_body_size 100M;
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    location / {
        proxy_pass http://combined_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https; # Forçamos HTTPS aqui
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
    }

    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
