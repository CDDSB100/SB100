# Nginx Reverse Proxy Configuration para sb100cientometria.optin.com.br
# Place this file in /etc/nginx/sites-available/sb100cientometria

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Agora tanto o Frontend quanto a API são servidos pelo mesmo container na porta 5173
upstream combined_backend {
    server 127.0.0.1:5173;
}

upstream fastapi {
    # Python FastAPI server
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name sb100cientometria.optin.com.br;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sb100cientometria.optin.com.br;

    ssl_certificate /etc/letsencrypt/live/sb100cientometria.optin.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sb100cientometria.optin.com.br/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    client_max_body_size 100M;
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;

    # ┌─────────────────────────────────────────────────┐
    # │ RUTA 1: Frontend (React) + API (/api)          │
    # └─────────────────────────────────────────────────┘
    location / {
        proxy_pass http://combined_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
    }

    # ┌─────────────────────────────────────────────────┐
    # │ RUTA 2: FastAPI (Python)                       │
    # └─────────────────────────────────────────────────┘
    location /api-py/ {
        proxy_pass http://fastapi/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
