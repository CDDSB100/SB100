# Nginx Reverse Proxy Configuration para sb100cientometria.optin.com.br
# Place this file in /etc/nginx/sites-available/sb100cientometria
# Then: sudo ln -s /etc/nginx/sites-available/sb100cientometria /etc/nginx/sites-enabled/
# Finally: sudo systemctl restart nginx

upstream frontend {
    # Vite dev server ou build distribuído
    server 172.28.181.92:5173;
}

upstream backend {
    # Node.js Express API server
    server 172.28.181.92:5001;
}

upstream fastapi {
    # Python FastAPI server
    server 172.28.181.92:8000;
}

server {
    listen 80;
    server_name sb100cientometria.optin.com.br;
    
    # Redirecionar HTTP para HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sb100cientometria.optin.com.br;

    # ┌─────────────────────────────────────┐
    # │ CERTIFICADO SSL (Let's Encrypt)    │
    # └─────────────────────────────────────┘
    ssl_certificate /etc/letsencrypt/live/sb100cientometria.optin.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sb100cientometria.optin.com.br/privkey.pem;
    
    # SSL Configuration (A+ rating)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Límites de tamaño
    client_max_body_size 100M;

    # Compresión GZIP
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;

    # ┌─────────────────────────────────────────────────┐
    # │ RUTA 1: Frontend (React/Vite)                  │
    # │ Padrão: Todos os requests vão para frontend    │
    # └─────────────────────────────────────────────────┘
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        
        # Headers essenciais
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Cache prevention
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ┌─────────────────────────────────────────────────┐
    # │ RUTA 2: Backend API (Express)                  │
    # │ Padrão: /api/... → localhost:5001              │
    # └─────────────────────────────────────────────────┘
    location /api/ {
        proxy_pass http://backend/;
        proxy_http_version 1.1;
        
        # Headers essenciais
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        
        # CORS headers (se não estão configurados no backend)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ┌─────────────────────────────────────────────────┐
    # │ RUTA 3: FastAPI (Python)                       │
    # │ Padrão: /api-py/... → localhost:8000           │
    # │ (alternativo, se quiser separar Python)        │
    # └─────────────────────────────────────────────────┘
    location /api-py/ {
        proxy_pass http://fastapi/;
        proxy_http_version 1.1;
        
        # Headers essenciais
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        
        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ┌─────────────────────────────────────────────────┐
    # │ RUTA 4: Health Check                           │
    # └─────────────────────────────────────────────────┘
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ┌─────────────────────────────────────────────────┐
    # │ SEGURANÇA: Headers de Segurança                │
    # └─────────────────────────────────────────────────┘
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
