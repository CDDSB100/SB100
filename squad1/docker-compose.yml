services:
  mongodb:
    image: mongo:4.4
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend-node:
    build:
      context: .
      dockerfile: Dockerfile.combined
    ports:
      # MAPEAMENTO DIRETO: Host 5173 -> Container 5173 (HTTP)
      - "5173:5173"
    depends_on:
      - mongodb
      - backend-python
    volumes:
      - ./backend/documents:/app/backend/documents
      - ./backend/api.db:/app/backend/api.db
      - "./backend/Consolidado - Respostas Gerais.xlsx:/app/backend/Consolidado - Respostas Gerais.xlsx"
    environment:
      - PORT=5173
      - API_BASE_URL=http://backend-python:8000
      - MONGODB_URI=mongodb://mongodb:27017/cientometria
    env_file:
      - ./backend/.env
    restart: always

  backend-python:
    build:
      context: ./backend
      dockerfile: Dockerfile.python
    # Backend Python fica apenas na rede interna, acessado via proxy do Node
    environment:
      - PORT=8000
    env_file:
      - ./backend/.env
    restart: always

volumes:
  mongodb_data:
