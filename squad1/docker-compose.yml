version: '3.8'

services:
  mongodb:
    image: mongo:4.4
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  backend-node:
    build:
      context: .
      dockerfile: Dockerfile.combined
    ports:
      - "5173:5173"
      - "5001:5001"
    depends_on:
      - mongodb
      - backend-python
    volumes:
      - ./backend/documents:/app/backend/documents
      - ./backend/api.db:/app/backend/api.db
      - "./backend/Consolidado - Respostas Gerais.xlsx:/app/backend/Consolidado - Respostas Gerais.xlsx"
    environment:
      - PORT=5173
      - API_BASE_URL=http://backend-python:8000
      - MONGODB_URI=mongodb://mongodb:27017/cientometria
    env_file:
      - ./backend/.env
    restart: always

  backend-python:
    build:
      context: ./backend
      dockerfile: Dockerfile.python
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    env_file:
      - ./backend/.env
    restart: always

volumes:
  mongodb_data:
